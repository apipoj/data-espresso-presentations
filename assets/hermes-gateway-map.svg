<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-label="Hermes gateway platforms">
<defs>
  <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
    <stop offset="0%" stop-color="#301e45"/>
    <stop offset="55%" stop-color="#18222d"/>
    <stop offset="100%" stop-color="#0f1720"/>
  </linearGradient>
  <linearGradient id="accent" x1="0" x2="1" y1="0" y2="1">
    <stop offset="0%" stop-color="#b67b25"/>
    <stop offset="100%" stop-color="#c81559"/>
  </linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.28"/>
  </filter>
  <style>
    .title{font:800 54px 'Noto Sans Thai',Arial,sans-serif;fill:#fff}
    .sub{font:500 24px 'Noto Sans Thai',Arial,sans-serif;fill:#dac3da}
    .small{font:600 20px 'Noto Sans Thai',Arial,sans-serif;fill:#f7efe0}
    .mono{font:600 21px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#f8fafc}
    .label{font:800 22px 'Noto Sans Thai',Arial,sans-serif;fill:#301e45}
    .muted{font:500 17px 'Noto Sans Thai',Arial,sans-serif;fill:#64748b}
  </style>
</defs>
<rect width="1200" height="675" rx="36" fill="url(#bg)"/>
<text x="70" y="92" class="title" style="font-size:50px">Gateway ทำให้ Hermes อยู่ในที่ที่ทีมคุยกัน</text>
<text x="74" y="140" class="sub">หนึ่ง agent, หลาย platform, tool access เดียวกัน</text>
<g filter="url(#shadow)"><rect x="455" y="255" width="290" height="150" rx="34" fill="#fff"/><text x="518" y="335" class="label" style="font-size:38px">Hermes</text><text x="510" y="372" class="muted">gateway run/service</text></g>
<g fill="rgba(255,255,255,0.09)" stroke="rgba(255,255,255,0.18)" stroke-width="2">
 <rect x="90" y="225" width="220" height="110" rx="28"/><rect x="90" y="420" width="220" height="110" rx="28"/><rect x="890" y="225" width="220" height="110" rx="28"/><rect x="890" y="420" width="220" height="110" rx="28"/>
</g>
<text x="135" y="292" class="small">Telegram</text><text x="148" y="487" class="small">Discord</text><text x="955" y="292" class="small">Slack</text><text x="945" y="487" class="small">Email/API</text>
<g stroke="#b67b25" stroke-width="7" fill="none" stroke-linecap="round"><path d="M310 280h145"/><path d="M310 475c105 0 110-75 170-105"/><path d="M745 280h145"/><path d="M890 475c-105 0-110-75-170-105"/></g>
</svg>
