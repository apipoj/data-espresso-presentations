<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-label="Hermes local architecture">
<defs>
  <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
    <stop offset="0%" stop-color="#301e45"/>
    <stop offset="55%" stop-color="#18222d"/>
    <stop offset="100%" stop-color="#0f1720"/>
  </linearGradient>
  <linearGradient id="accent" x1="0" x2="1" y1="0" y2="1">
    <stop offset="0%" stop-color="#b67b25"/>
    <stop offset="100%" stop-color="#c81559"/>
  </linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.28"/>
  </filter>
  <style>
    .title{font:800 54px 'Noto Sans Thai',Arial,sans-serif;fill:#fff}
    .sub{font:500 24px 'Noto Sans Thai',Arial,sans-serif;fill:#dac3da}
    .small{font:600 20px 'Noto Sans Thai',Arial,sans-serif;fill:#f7efe0}
    .mono{font:600 21px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#f8fafc}
    .label{font:800 22px 'Noto Sans Thai',Arial,sans-serif;fill:#301e45}
    .muted{font:500 17px 'Noto Sans Thai',Arial,sans-serif;fill:#64748b}
  </style>
</defs>
<rect width="1200" height="675" rx="36" fill="#fbf8fc"/>
<text x="70" y="90" class="label" style="font-size:42px">Hermes อยู่ตรงกลางระหว่างคน, เครื่อง, และ cloud tools</text>
<g filter="url(#shadow)">
  <rect x="470" y="220" width="260" height="170" rx="30" fill="url(#bg)"/>
  <text x="522" y="300" class="title" style="font-size:38px">Hermes</text>
  <text x="510" y="342" class="sub">agent runtime</text>
</g>
<g fill="#fff" stroke="#e5d9ea" stroke-width="3">
  <rect x="80" y="210" width="250" height="140" rx="26"/><rect x="870" y="210" width="250" height="140" rx="26"/><rect x="80" y="430" width="250" height="140" rx="26"/><rect x="870" y="430" width="250" height="140" rx="26"/>
</g>
<text x="125" y="265" class="label">Terminal</text><text x="125" y="306" class="muted">files, commands, git</text>
<text x="915" y="265" class="label">LLM Provider</text><text x="915" y="306" class="muted">OpenRouter, Codex, Nous</text>
<text x="125" y="485" class="label">Messaging</text><text x="125" y="526" class="muted">Telegram, Discord, Slack</text>
<text x="915" y="485" class="label">Tools + MCP</text><text x="915" y="526" class="muted">web, browser, cron, APIs</text>
<g stroke="#b67b25" stroke-width="7" fill="none" stroke-linecap="round"><path d="M330 280h120"/><path d="M730 280h140"/><path d="M330 500c80 0 100-80 165-125"/><path d="M870 500c-80 0-100-80-165-125"/></g>
</svg>
