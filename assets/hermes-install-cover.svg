<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-label="Hermes Agent install workshop cover">
<defs>
  <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
    <stop offset="0%" stop-color="#301e45"/>
    <stop offset="55%" stop-color="#18222d"/>
    <stop offset="100%" stop-color="#0f1720"/>
  </linearGradient>
  <linearGradient id="accent" x1="0" x2="1" y1="0" y2="1">
    <stop offset="0%" stop-color="#b67b25"/>
    <stop offset="100%" stop-color="#c81559"/>
  </linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.28"/>
  </filter>
  <style>
    .title{font:800 56px 'Noto Sans Thai',Arial,sans-serif;fill:#fff}
    .sub{font:600 29px 'Noto Sans Thai',Arial,sans-serif;fill:#fff4ff}
    .small{font:800 24px 'Noto Sans Thai',Arial,sans-serif;fill:#ffffff}
    .mono{font:700 25px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#f8fafc}
    .label{font:800 22px 'Noto Sans Thai',Arial,sans-serif;fill:#301e45}
    .muted{font:500 17px 'Noto Sans Thai',Arial,sans-serif;fill:#64748b}
    .eyebrow{font:900 19px 'Noto Sans Thai',Arial,sans-serif;letter-spacing:3px;fill:#ffffff}
  </style>
</defs>
<rect width="1200" height="675" rx="36" fill="url(#bg)"/>
<circle cx="970" cy="140" r="170" fill="#c81559" opacity="0.22"/>
<circle cx="220" cy="520" r="220" fill="#b67b25" opacity="0.16"/>
<g opacity="0.10" stroke="#fff"><path d="M0 120h1200M0 240h1200M0 360h1200M0 480h1200M180 0v675M360 0v675M540 0v675M720 0v675M900 0v675M1080 0v675"/></g>
<rect x="70" y="82" width="278" height="48" rx="24" fill="url(#accent)" opacity="0.96"/>
<text x="96" y="113" class="eyebrow">DATA-ESPRESSO</text>
<g filter="url(#shadow)">
  <rect x="635" y="145" width="440" height="360" rx="30" fill="#060b16" stroke="rgba(255,255,255,0.24)" stroke-width="2"/>
  <circle cx="675" cy="184" r="9" fill="#ff5f57"/><circle cx="706" cy="184" r="9" fill="#febc2e"/><circle cx="737" cy="184" r="9" fill="#28c840"/>
  <text x="675" y="250" class="mono">$ curl -fsSL ... | bash</text>
  <text x="675" y="296" class="mono">$ hermes setup</text>
  <text x="675" y="342" class="mono">$ hermes doctor</text>
  <rect x="675" y="390" width="350" height="64" rx="16" fill="url(#accent)"/>
  <text x="704" y="431" class="small">ready for CLI + Gateway</text>
</g>
<text x="88" y="180" class="title">Hermes Agent</text>
<text x="88" y="244" class="title">Install Workshop</text>
<text x="92" y="304" class="sub">ลงมือทำทีละ step ไม่จำ command มั่ว</text>
<text x="92" y="344" class="sub">ตั้ง model, เปิด tools, ต่อ gateway</text>
<text x="92" y="384" class="sub">จบด้วย proof ว่าใช้ได้จริง</text>
<rect x="92" y="430" width="455" height="66" rx="33" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.22)" stroke-width="2"/>
<text x="122" y="472" class="small">Practical AI operating deck</text>
</svg>
