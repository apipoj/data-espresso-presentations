<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-label="Hermes Agent install workshop cover">
<defs>
  <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
    <stop offset="0%" stop-color="#301e45"/>
    <stop offset="55%" stop-color="#18222d"/>
    <stop offset="100%" stop-color="#0f1720"/>
  </linearGradient>
  <linearGradient id="accent" x1="0" x2="1" y1="0" y2="1">
    <stop offset="0%" stop-color="#b67b25"/>
    <stop offset="100%" stop-color="#c81559"/>
  </linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.28"/>
  </filter>
  <style>
    .title{font:800 54px 'Noto Sans Thai',Arial,sans-serif;fill:#fff}
    .sub{font:600 27px 'Noto Sans Thai',Arial,sans-serif;fill:#eee0ee}
    .small{font:600 20px 'Noto Sans Thai',Arial,sans-serif;fill:#f7efe0}
    .mono{font:600 21px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#f8fafc}
    .label{font:800 22px 'Noto Sans Thai',Arial,sans-serif;fill:#301e45}
    .muted{font:500 17px 'Noto Sans Thai',Arial,sans-serif;fill:#64748b}
  </style>
</defs>
<rect width="1200" height="675" rx="36" fill="url(#bg)"/>
<circle cx="970" cy="140" r="170" fill="#c81559" opacity="0.22"/>
<circle cx="220" cy="520" r="220" fill="#b67b25" opacity="0.16"/>
<g opacity="0.15" stroke="#fff"><path d="M0 120h1200M0 240h1200M0 360h1200M0 480h1200M180 0v675M360 0v675M540 0v675M720 0v675M900 0v675M1080 0v675"/></g>
<g filter="url(#shadow)">
  <rect x="650" y="155" width="410" height="330" rx="26" fill="#0b1220" stroke="rgba(255,255,255,0.16)"/>
  <circle cx="686" cy="190" r="8" fill="#ff5f57"/><circle cx="714" cy="190" r="8" fill="#febc2e"/><circle cx="742" cy="190" r="8" fill="#28c840"/>
  <text x="685" y="250" class="mono">$ curl -fsSL ... | bash</text>
  <text x="685" y="292" class="mono">$ hermes setup</text>
  <text x="685" y="334" class="mono">$ hermes doctor</text>
  <rect x="685" y="370" width="300" height="58" rx="14" fill="url(#accent)"/>
  <text x="710" y="407" class="small">ready for CLI + Gateway</text>
</g>
<text x="88" y="180" class="title">Hermes Agent</text>
<text x="88" y="244" class="title">Install Workshop</text>
<text x="92" y="310" class="sub">ติดตั้ง, ตั้งค่า model, เปิด tools, ต่อ Telegram/Discord</text>
<text x="92" y="354" class="sub">และ verify ให้พร้อมใช้งานจริงใน 30 นาที</text>
<rect x="92" y="420" width="390" height="58" rx="29" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.14)"/>
<text x="122" y="457" class="small">Data-Espresso practical AI deck</text>
</svg>
