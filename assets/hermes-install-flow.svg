<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-label="Hermes install flow">
<defs>
  <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
    <stop offset="0%" stop-color="#301e45"/>
    <stop offset="55%" stop-color="#18222d"/>
    <stop offset="100%" stop-color="#0f1720"/>
  </linearGradient>
  <linearGradient id="accent" x1="0" x2="1" y1="0" y2="1">
    <stop offset="0%" stop-color="#b67b25"/>
    <stop offset="100%" stop-color="#c81559"/>
  </linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.28"/>
  </filter>
  <style>
    .title{font:800 54px 'Noto Sans Thai',Arial,sans-serif;fill:#fff}
    .sub{font:500 24px 'Noto Sans Thai',Arial,sans-serif;fill:#dac3da}
    .small{font:600 20px 'Noto Sans Thai',Arial,sans-serif;fill:#f7efe0}
    .mono{font:600 21px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#f8fafc}
    .label{font:800 22px 'Noto Sans Thai',Arial,sans-serif;fill:#301e45}
    .muted{font:500 17px 'Noto Sans Thai',Arial,sans-serif;fill:#64748b}
  </style>
</defs>
<rect width="1200" height="675" rx="36" fill="#ffffff"/>
<text x="70" y="88" class="label" style="font-size:44px">Install flow แบบ Arty: ทำแล้วต้องมี proof</text>
<g transform="translate(70 170)">
  <g><circle cx="70" cy="70" r="58" fill="url(#accent)"/><text x="48" y="84" class="title" style="font-size:42px">1</text><text x="0" y="170" class="label">Install</text><text x="0" y="205" class="muted">official installer</text></g>
  <g transform="translate(260 0)"><circle cx="70" cy="70" r="58" fill="#301e45"/><text x="48" y="84" class="title" style="font-size:42px">2</text><text x="0" y="170" class="label">Setup</text><text x="0" y="205" class="muted">เลือกให้เหมาะงาน</text></g>
  <g transform="translate(520 0)"><circle cx="70" cy="70" r="58" fill="#18222d"/><text x="48" y="84" class="title" style="font-size:42px">3</text><text x="0" y="170" class="label">Tools</text><text x="0" y="205" class="muted">เปิดเท่าที่ใช้จริง</text></g>
  <g transform="translate(780 0)"><circle cx="70" cy="70" r="58" fill="#c81559"/><text x="48" y="84" class="title" style="font-size:42px">4</text><text x="0" y="170" class="label">Verify</text><text x="0" y="205" class="muted">มีหลักฐานก่อนจบ</text></g>
  <g stroke="#dac3da" stroke-width="9" stroke-linecap="round"><path d="M140 70h175"/><path d="M400 70h175"/><path d="M660 70h175"/></g>
</g>
<rect x="88" y="455" width="1024" height="130" rx="28" fill="#18222d" stroke="#b67b25" stroke-width="3"/>
<text x="130" y="510" class="mono" style="font-size:25px;fill:#ffffff">source ~/.zshrc  |  hermes setup  |  hermes doctor</text>
<text x="130" y="552" class="mono" style="font-size:25px;fill:#dac3da">hermes chat -q "ping"</text>
</svg>
