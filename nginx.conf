server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location = / {
    try_files /index.html =404;
  }

  location / {
    try_files $uri $uri/ @slidev;
  }

  location @slidev {
    if ($uri ~ ^/([^/]+)/) {
      rewrite ^ /$1/index.html break;
    }
    rewrite ^ /index.html break;
  }
}
