server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location = / {
    try_files /index.html =404;
  }

  # Multi-deck Slidev routing:
  # - real files such as /deck/assets/index.js are served directly
  # - deep slide URLs such as /deck/7 fall back to /deck/index.html
  location ~ ^/([^/]+)/.+$ {
    try_files $uri $uri/ /$1/index.html;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
